openapi: 3.1.0
info:
  title: Ordina API
  version: 2.0.0
  description: API unificada para legislaciones y jurisprudencia (SJF) normalizada para GPT.

servers:
  - url: https://ordina-engine.vercel.app

paths:
  /health:
    get:
      operationId: healthOrdina
      summary: Estado del servicio
      responses:
        "200":
          description: Servicio disponible
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                required:
                  - status
                  - service

  /health/deep:
    get:
      operationId: deepHealthOrdina
      summary: Estado profundo del servicio y dependencias
      responses:
        "200":
          description: Todas las dependencias operando
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepHealthResponse"
        "503":
          description: Alguna dependencia degradada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepHealthResponse"

  /ley:
    get:
      operationId: buscarLey
      summary: Buscar leyes por id categoria o nombre
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: integer
        - name: categoria
          in: query
          required: false
          schema:
            type: integer
        - name: nombre
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Lista de leyes encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    categoria:
                      type: integer
                    nombre:
                      type: string

  /jurisprudencia/buscar:
    get:
      operationId: buscarJurisprudencia
      summary: Buscar jurisprudencia SJF por termino simple
      description: Si no se envia q devuelve resultados generales con filtros por defecto.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          example: amparo
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Resultado paginado normalizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisprudenciaSearchResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con SJF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: buscarJurisprudenciaAvanzada
      summary: Buscar jurisprudencia SJF con payload avanzado
      description: Envia el body completo del formato de busqueda SJF.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                classifiers:
                  type: array
                  items:
                    type: object
                    properties: {}
                searchTerms:
                  type: array
                  items:
                    type: object
                    properties: {}
                bFacet:
                  type: boolean
                ius:
                  type: array
                  items:
                    type: integer
                idApp:
                  type: string
                lbSearch:
                  type: array
                  items:
                    type: string
                filterExpression:
                  type: string
      responses:
        "200":
          description: Resultado paginado normalizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisprudenciaSearchResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con SJF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jurisprudencia/detalle:
    get:
      operationId: obtenerDetalleJurisprudencia
      summary: Obtener detalle de tesis por IUS
      description: Enviar solo el IUS. El proxy resuelve internamente isSemanal y hostName.
      parameters:
        - name: ius
          in: query
          required: true
          schema:
            type: integer
          example: 2031780
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: debug
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Detalle normalizado de tesis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisprudenciaDetailResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con SJF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /precedentes/buscar:
    get:
      operationId: buscarPrecedentesSCJN
      summary: Buscar precedentes y sentencias en el buscador juridico SCJN
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          example: partido*
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: indice
          in: query
          required: false
          schema:
            type: string
            default: ejecutorias
        - name: fuente
          in: query
          required: false
          schema:
            type: string
            default: SJF
        - name: extractos
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 1000
            default: 200
        - name: semantica
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Resultado paginado normalizado de precedentes SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrecedentesSearchResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: buscarPrecedentesSCJNAvanzado
      summary: Buscar precedentes SCJN con payload avanzado
      parameters:
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                q:
                  type: string
                page:
                  type: integer
                  minimum: 1
                size:
                  type: integer
                  minimum: 1
                  maximum: 50
                indice:
                  type: string
                fuente:
                  type: string
                extractos:
                  type: integer
                semantica:
                  type: integer
                filtros:
                  type: object
                  properties: {}
                sortField:
                  type: string
                sortDireccion:
                  type: string
      responses:
        "200":
          description: Resultado paginado normalizado de precedentes SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrecedentesSearchResponse"
        "400":
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /legislacion/buscar:
    get:
      operationId: buscarLegislacionSCJN
      summary: Buscar ordenamientos y leyes en SIL desde el buscador juridico SCJN
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          example: Electoral
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: fuente
          in: query
          required: false
          schema:
            type: string
            default: SIL
        - name: indice
          in: query
          required: false
          schema:
            type: string
            default: legislacion
        - name: extractos
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 1000
            default: 200
        - name: semantica
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: categoriaOrdenamiento
          in: query
          required: false
          schema:
            type: string
          description: Valores separados por coma, por ejemplo LEY,CONSTITUCION.
        - name: ambito
          in: query
          required: false
          schema:
            type: string
          description: Valores separados por coma, por ejemplo FEDERAL.
        - name: estado
          in: query
          required: false
          schema:
            type: string
        - name: materia
          in: query
          required: false
          schema:
            type: string
        - name: vigencia
          in: query
          required: false
          schema:
            type: string
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Resultado paginado normalizado de legislacion SIL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegislacionSearchResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: buscarLegislacionSCJNAvanzado
      summary: Buscar legislacion SIL con payload avanzado
      parameters:
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                q:
                  type: string
                page:
                  type: integer
                  minimum: 1
                size:
                  type: integer
                  minimum: 1
                  maximum: 50
                indice:
                  type: string
                fuente:
                  type: string
                extractos:
                  type: integer
                semantica:
                  type: integer
                filtros:
                  type: object
                  properties: {}
                sortField:
                  type: string
                sortDireccion:
                  type: string
      responses:
        "200":
          description: Resultado paginado normalizado de legislacion SIL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegislacionSearchResponse"
        "400":
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /normas/buscar:
    get:
      operationId: buscarNormasUnificadas
      summary: Buscar normas unificando catalogo Jurislex y legislacion SIL
      parameters:
        - name: nombre
          in: query
          required: true
          schema:
            type: string
          example: Ley de Amparo
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: categoriaOrdenamiento
          in: query
          required: false
          schema:
            type: string
        - name: ambito
          in: query
          required: false
          schema:
            type: string
        - name: estado
          in: query
          required: false
          schema:
            type: string
        - name: materia
          in: query
          required: false
          schema:
            type: string
        - name: vigencia
          in: query
          required: false
          schema:
            type: string
        - name: semantica
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Resultado unificado de normas disponibles en ambas fuentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormasSearchResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: buscarNormasUnificadasAvanzado
      summary: Buscar normas unificadas con payload JSON
      parameters:
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                q:
                  type: string
                page:
                  type: integer
                  minimum: 1
                size:
                  type: integer
                  minimum: 1
                  maximum: 50
                categoriaOrdenamiento:
                  type: string
                ambito:
                  type: string
                estado:
                  type: string
                materia:
                  type: string
                vigencia:
                  type: string
                semantica:
                  type: integer
      responses:
        "200":
          description: Resultado unificado de normas disponibles en ambas fuentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormasSearchResponse"
        "400":
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /normas/articulos/buscar:
    get:
      operationId: buscarArticulosNormaUnificada
      summary: Buscar articulos de una norma resolviendo automaticamente Jurislex o SIL
      parameters:
        - name: nombre
          in: query
          required: true
          schema:
            type: string
        - name: articulo
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: categoriaOrdenamiento
          in: query
          required: false
          schema:
            type: string
        - name: ambito
          in: query
          required: false
          schema:
            type: string
        - name: estado
          in: query
          required: false
          schema:
            type: string
        - name: materia
          in: query
          required: false
          schema:
            type: string
        - name: vigencia
          in: query
          required: false
          schema:
            type: string
        - name: semantica
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Articulos encontrados con enrutamiento automatico de fuente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormasArticulosSearchResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: buscarArticulosNormaUnificadaAvanzado
      summary: Buscar articulos de una norma con payload JSON y enrutamiento automatico
      parameters:
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                qNorma:
                  type: string
                articulo:
                  type: string
                q:
                  type: string
                page:
                  type: integer
                size:
                  type: integer
                categoriaOrdenamiento:
                  type: string
                ambito:
                  type: string
                estado:
                  type: string
                materia:
                  type: string
                vigencia:
                  type: string
                semantica:
                  type: integer
      responses:
        "200":
          description: Articulos encontrados con enrutamiento automatico de fuente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormasArticulosSearchResponse"
        "400":
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /normas/articulos/detalle:
    get:
      operationId: obtenerDetalleArticuloNormaUnificada
      summary: Obtener detalle unificado de un articulo resolviendo automaticamente Jurislex o SIL
      parameters:
        - name: nombre
          in: query
          required: true
          schema:
            type: string
        - name: articulo
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: categoriaOrdenamiento
          in: query
          required: false
          schema:
            type: string
        - name: ambito
          in: query
          required: false
          schema:
            type: string
        - name: estado
          in: query
          required: false
          schema:
            type: string
        - name: materia
          in: query
          required: false
          schema:
            type: string
        - name: vigencia
          in: query
          required: false
          schema:
            type: string
        - name: semantica
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Detalle unificado del articulo con estructura normativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormaArticuloDetailResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Articulo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con fuente upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: obtenerDetalleArticuloNormaUnificadaAvanzado
      summary: Obtener detalle unificado de un articulo con payload JSON
      parameters:
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                qNorma:
                  type: string
                articulo:
                  type: string
                q:
                  type: string
                page:
                  type: integer
                size:
                  type: integer
                categoriaOrdenamiento:
                  type: string
                ambito:
                  type: string
                estado:
                  type: string
                materia:
                  type: string
                vigencia:
                  type: string
                semantica:
                  type: integer
      responses:
        "200":
          description: Detalle unificado del articulo con estructura normativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormaArticuloDetailResponse"
        "400":
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Articulo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con fuente upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /legislacion/detalle:
    get:
      operationId: obtenerDetalleLegislacionSCJN
      summary: Obtener el texto estructurado de un ordenamiento del indice de legislacion SCJN
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Detalle normalizado del ordenamiento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegislacionDetailResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /legislacion/articulos/buscar:
    get:
      operationId: buscarArticulosLegislacionSCJN
      summary: Buscar artículos dentro de un ordenamiento del indice de legislacion SCJN
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: articulo
          in: query
          required: false
          schema:
            type: string
          description: Numero o referencia de articulo, por ejemplo 5 o articulo 5.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Texto libre a buscar dentro del contenido del articulo.
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Articulos filtrados dentro del ordenamiento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegislacionArticulosSearchResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con buscador SCJN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jurislex/decretos:
    get:
      operationId: obtenerDecretosJurislex
      summary: Obtener anexos/decretos de una legislacion
      parameters:
        - name: idLegislacion
          in: query
          required: true
          schema:
            type: integer
        - name: idOrdenamiento
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Lista de decretos o anexos
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties: {}
        "502":
          description: Error de conexion con Jurislex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jurislex/articulos/buscar:
    get:
      operationId: buscarArticulosJurislex
      summary: Buscar articulos en Jurislex
      description: Busqueda por numero o palabra clave usando categoria e idLegislacion validados.
      parameters:
        - name: categoria
          in: query
          required: true
          schema:
            type: integer
        - name: idLegislacion
          in: query
          required: true
          schema:
            type: integer
        - name: desc
          in: query
          required: false
          schema:
            type: string
            default: ""
        - name: soloArticulo
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: indice
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: elementos
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: articuloNumero
          in: query
          required: false
          schema:
            type: integer
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Resultado paginado normalizado de articulos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurislexSearchResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con Jurislex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: buscarArticulosJurislexAvanzado
      summary: Buscar articulos con payload avanzado Jurislex
      description: Devuelve una respuesta normalizada similar a la del GET, pero sin garantizar `idLegislacion`, `indice` ni `elementos`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoria:
                  type: integer
                includeRaw:
                  type: boolean
                datosArticulo:
                  type: object
                  properties:
                    IdLegislacion:
                      type: array
                      items:
                        type: integer
                    Desc:
                      type: string
                    Indice:
                      type: integer
                    Elementos:
                      type: integer
                    Ordenamiento:
                      type: string
                    SoloArticulo:
                      type: boolean
                    SoloIndices:
                      type: boolean
                    filterRaw:
                      type: string
      responses:
        "200":
          description: Resultado paginado normalizado de articulos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurislexSearchResponsePost"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con Jurislex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jurislex/articulos/detalle:
    get:
      operationId: obtenerDetalleArticuloJurislex
      summary: Obtener texto completo de un articulo en Jurislex
      parameters:
        - name: categoria
          in: query
          required: true
          schema:
            type: integer
        - name: idLegislacion
          in: query
          required: true
          schema:
            type: integer
        - name: idArticulo
          in: query
          required: true
          schema:
            type: integer
        - name: includeRaw
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Detalle normalizado de articulo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurislexDetailResponse"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error de conexion con Jurislex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /citas/extraer:
    post:
      operationId: extraerCitasJuridicas
      summary: Extraer citas de articulos leyes y jurisprudencia desde texto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                texto:
                  type: string
                  description: Texto juridico a analizar.
                fuente:
                  type: string
                  description: Nombre opcional del archivo o fuente.
                resolver:
                  type: boolean
                  description: Cuando es true, intenta resolver cada cita y agrega `textoCita` en los items resueltos.
              required:
                - texto
      responses:
        "200":
          description: Citas detectadas y normalizadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitasExtractionResponse"
        "400":
          description: Texto faltante o invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

